language: "en-US"
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!data/screenshots/**"
    - "!logs/**"
    - "!*.png"
    - "!*.jpg"
    - "!opendesk.db"
    - "!.env"
    - "!tmp/**"
